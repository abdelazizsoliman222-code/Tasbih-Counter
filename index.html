<!DOCTYPE html>
<html>
<head>
<title>Tasbih Counter</title>
</head>
<body>

<div align="center">

<h1>Tasbih Counter</h1>

<p>Enter your target:</p>
<input type="number" id="target" value="33">

<h2 id="count">0</h2>
<h3 id="highScore">High Score: 0</h3>

<input 
type="image"
src="اذكر الله .png"
width="120"
height="120"
onclick="addLap(); return false;"
>

<p>Progress:</p>
<progress id="progressBar" value="0" max="10"></progress>

<p>Energy level:</p>
<meter id="energy" min="0" max="100" value="0"></meter>

</div>

<table width="100%">
<tr>
<td align="left">
<div id="motivationLeftBox" style="border:1px solid black; padding:5px; display:none; background-color:#f0f0f0; width:90%">
<p id="motivationLeft"></p>
</div>
</td>
<td align="right">
<div id="motivationRightBox" style="border:1px solid black; padding:5px; display:none; background-color:#f0f0f0; width:90%">
<p id="motivationRight"></p>
</div>
</td>
</tr>
</table>

<footer align="center">Made by: Abdelaziz Soliman</footer>

<script src="Tasbih.js"></script>

</body>
</html>
